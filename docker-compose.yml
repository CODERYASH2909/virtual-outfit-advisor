version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: voa_db
      POSTGRES_USER: voa_user
      POSTGRES_PASSWORD: voa_password
    volumes:
      - voa_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voa_user -d voa_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_ENGINE: postgres
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/media:/app/media
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  voa_postgres_data:
