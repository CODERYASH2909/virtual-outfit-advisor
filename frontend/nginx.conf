server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /pages/ {
        try_files $uri $uri.html =404;
    }

    location /public/ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
