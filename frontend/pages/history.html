<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History — Virtual Outfit Advisor</title>
  <link rel="stylesheet" href="/public/assets/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50">
  <div class="flex min-h-screen">
    <aside id="sidebar-mount" class="hidden w-64 flex-shrink-0 border-r border-gray-100 bg-white p-5 lg:block"></aside>

    <main class="flex-1 p-6 md:p-10">
      <div class="mb-6 flex flex-wrap items-center justify-between gap-4">
        <div>
          <h1 class="text-2xl font-bold text-ink-900">Recommendation History</h1>
          <p class="text-sm text-gray-500">Every outfit suggestion you've generated, in one place.</p>
        </div>
        <div class="flex gap-3">
          <select data-filter="occasion" class="input-field w-auto">
            <option value="">All Occasions</option>
            <option value="casual">Casual</option>
            <option value="formal">Formal</option>
            <option value="business">Business</option>
            <option value="party">Party</option>
            <option value="sports">Sports</option>
            <option value="travel">Travel</option>
            <option value="beach">Beach</option>
            <option value="wedding">Wedding</option>
            <option value="loungewear">Loungewear</option>
          </select>
          <select data-filter="source" class="input-field w-auto">
            <option value="">All Sources</option>
            <option value="manual">Manual Request</option>
            <option value="weather">Weather-Based</option>
            <option value="occasion">Occasion-Based</option>
          </select>
        </div>
      </div>

      <div id="history-list" class="space-y-3"></div>
    </main>
  </div>

  <script type="module" src="/public/assets/js/pages/history.js"></script>
</body>
</html>
