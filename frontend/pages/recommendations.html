<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recommendations — Virtual Outfit Advisor</title>
  <meta name="description" content="Get outfit recommendations built from your own wardrobe, matched by weather and occasion." />
  <link rel="stylesheet" href="/public/assets/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-app-gradient">
  <div class="flex min-h-screen">
    <aside id="sidebar-mount" class="hidden w-64 flex-shrink-0 border-r border-gray-100/60 bg-white/70 backdrop-blur-xl p-5 lg:block scrollbar-thin"></aside>

    <main class="flex-1 p-6 md:p-10">
      <div class="mb-8 animate-fade-in-up">
        <h1 class="text-2xl font-bold text-ink-900">Outfit Recommendations</h1>
        <p class="text-sm text-gray-500">Get an outfit suggestion built from your own wardrobe, matched by weather, season, and occasion.</p>
      </div>

      <div class="card mb-8 max-w-4xl animate-fade-in-up animate-delay-100">
        <form id="recommend-form" class="grid gap-4 md:grid-cols-5 md:items-end">
          <div>
            <label class="label" for="rec-season">Season</label>
            <select id="rec-season" class="input-field">
              <option value="all_season">Any / Current</option>
              <option value="summer">Summer</option>
              <option value="winter">Winter</option>
              <option value="spring">Spring</option>
              <option value="autumn">Autumn</option>
              <option value="rainy">Rainy</option>
            </select>
          </div>
          <div>
            <label class="label" for="rec-city">City</label>
            <div class="relative flex items-center">
              <input id="rec-city" class="input-field pr-10 w-full" type="text" placeholder="Ahmedabad" />
              <button id="detect-loc-btn" type="button" class="absolute right-3 text-voa-500 hover:text-voa-700 transition-colors focus:outline-none" title="Use current location">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
              </button>
            </div>
          </div>
          <div>
            <label class="label" for="rec-country">Country</label>
            <select id="rec-country" class="input-field">
              <option value="">Select Country</option>
              <option value="IN" selected>India (IN)</option>
              <option value="US">United States (US)</option>
              <option value="GB">United Kingdom (GB)</option>
              <option value="FR">France (FR)</option>
              <option value="DE">Germany (DE)</option>
              <option value="IT">Italy (IT)</option>
              <option value="ES">Spain (ES)</option>
              <option value="JP">Japan (JP)</option>
              <option value="CA">Canada (CA)</option>
              <option value="AU">Australia (AU)</option>
              <option value="CH">Switzerland (CH)</option>
              <option value="SG">Singapore (SG)</option>
              <option value="AE">United Arab Emirates (AE)</option>
              <option value="NL">Netherlands (NL)</option>
              <option value="ZA">South Africa (ZA)</option>
              <option value="NZ">New Zealand (NZ)</option>
              <option value="BR">Brazil (BR)</option>
              <option value="MX">Mexico (MX)</option>
              <option value="CN">China (CN)</option>
              <option value="TH">Thailand (TH)</option>
              <option value="TR">Turkey (TR)</option>
              <option value="MV">Maldives (MV)</option>
              <option value="ID">Indonesia (ID)</option>
              <option value="GR">Greece (GR)</option>
              <option value="AT">Austria (AT)</option>
              <option value="SE">Sweden (SE)</option>
              <option value="NO">Norway (NO)</option>
              <option value="DK">Denmark (DK)</option>
              <option value="BE">Belgium (BE)</option>
              <option value="IE">Ireland (IE)</option>
              <option value="PT">Portugal (PT)</option>
              <option value="MY">Malaysia (MY)</option>
              <option value="VN">Vietnam (VN)</option>
              <option value="HK">Hong Kong (HK)</option>
              <option value="KR">South Korea (KR)</option>
            </select>
          </div>
          <div>
            <label class="label" for="rec-occasion">Occasion</label>
            <select id="rec-occasion" class="input-field">
              <option value="casual">Casual</option>
              <option value="formal">Formal</option>
              <option value="business">Business</option>
              <option value="party">Party</option>
              <option value="sports">Sports</option>
              <option value="travel">Travel</option>
              <option value="beach">Beach</option>
              <option value="wedding">Wedding</option>
              <option value="loungewear">Loungewear</option>
            </select>
          </div>
          <button id="generate-btn" type="submit" class="btn-primary">Generate Outfit</button>
        </form>
      </div>

      <div id="recommendation-result" class="max-w-4xl"></div>
    </main>
  </div>

  <script type="module" src="/public/assets/js/pages/recommendations.js"></script>
</body>
</html>
