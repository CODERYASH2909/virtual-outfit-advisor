<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Virtual Outfit Advisor</title>
  <meta name="description" content="Log in to your Virtual Outfit Advisor account to access your wardrobe and recommendations." />
  <link rel="stylesheet" href="/public/assets/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="flex min-h-screen items-center justify-center bg-auth-gradient px-4">
  <div class="w-full max-w-md animate-fade-in-up">
    <div class="mb-8 flex items-center justify-center gap-2.5">
      <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-voa-950 text-white font-display font-bold text-lg">V</div>
      <span class="font-display text-2xl text-ink-900">VOA</span>
    </div>

    <div class="rounded-2xl bg-white p-8 shadow-card border border-gray-100/80">
      <!-- Tab toggle -->
      <div class="mb-6 flex gap-2 rounded-lg bg-gray-100 p-1">
        <a href="/pages/register.html" class="auth-tab auth-tab-inactive">Create Account</a>
        <span class="auth-tab auth-tab-active">Sign In</span>
      </div>

      <h1 class="mb-1 text-2xl font-bold text-ink-900">Welcome back</h1>
      <p class="mb-6 text-sm text-gray-500">Log in to access your wardrobe and recommendations.</p>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="label" for="email">Email address</label>
          <input type="email" id="email" required class="input-field" placeholder="you@example.com" />
        </div>
        <div>
          <label class="label" for="password">Password</label>
          <input type="password" id="password" required class="input-field" placeholder="••••••••" />
        </div>
        <div class="flex justify-end">
          <a href="/pages/forgot-password.html" class="text-sm font-medium text-voa-700 hover:text-voa-900 transition-colors">Forgot password?</a>
        </div>
        <button id="login-submit" type="submit" class="btn-primary w-full">Sign In</button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-500">
        Don't have an account?
        <a href="/pages/register.html" class="font-medium text-voa-700 hover:text-voa-900 transition-colors">Create one</a>
      </p>
    </div>
    <p class="mt-6 text-center text-xs text-gray-400">Demo login: demo@voa.local / DemoPass123!</p>
  </div>

  <script type="module" src="/public/assets/js/pages/login.js"></script>
</body>
</html>
