<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Planner — Virtual Outfit Advisor</title>
  <link rel="stylesheet" href="/public/assets/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50">
  <div class="flex min-h-screen">
    <aside id="sidebar-mount" class="hidden w-64 flex-shrink-0 border-r border-gray-100 bg-white p-5 lg:block"></aside>

    <main class="flex-1 p-6 md:p-10">
      <div class="mb-8">
        <h1 class="text-2xl font-bold text-ink-900">Travel Planner</h1>
        <p class="text-sm text-gray-500">Weather-based packing lists and outfit suggestions for your trip.</p>
      </div>

      <div class="grid gap-8 lg:grid-cols-3">
        <div class="lg:col-span-2">
          <div class="card mb-6">
            <form id="travel-form" class="space-y-4">
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="label" for="destination_city">Destination city</label>
                  <input type="text" id="destination_city" required class="input-field" placeholder="e.g. Paris" />
                </div>
                <div>
                  <label class="label" for="destination_country">Country (optional)</label>
                  <select id="destination_country" class="input-field">
                    <option value="">Select Country</option>
                    <option value="IN">India (IN)</option>
                    <option value="US">United States (US)</option>
                    <option value="GB">United Kingdom (GB)</option>
                    <option value="FR">France (FR)</option>
                    <option value="DE">Germany (DE)</option>
                    <option value="IT">Italy (IT)</option>
                    <option value="ES">Spain (ES)</option>
                    <option value="JP">Japan (JP)</option>
                    <option value="CA">Canada (CA)</option>
                    <option value="AU">Australia (AU)</option>
                    <option value="CH">Switzerland (CH)</option>
                    <option value="SG">Singapore (SG)</option>
                    <option value="AE">United Arab Emirates (AE)</option>
                    <option value="NL">Netherlands (NL)</option>
                    <option value="ZA">South Africa (ZA)</option>
                    <option value="NZ">New Zealand (NZ)</option>
                    <option value="BR">Brazil (BR)</option>
                    <option value="MX">Mexico (MX)</option>
                    <option value="CN">China (CN)</option>
                    <option value="TH">Thailand (TH)</option>
                    <option value="TR">Turkey (TR)</option>
                    <option value="MV">Maldives (MV)</option>
                    <option value="ID">Indonesia (ID)</option>
                    <option value="GR">Greece (GR)</option>
                    <option value="AT">Austria (AT)</option>
                    <option value="SE">Sweden (SE)</option>
                    <option value="NO">Norway (NO)</option>
                    <option value="DK">Denmark (DK)</option>
                    <option value="BE">Belgium (BE)</option>
                    <option value="IE">Ireland (IE)</option>
                    <option value="PT">Portugal (PT)</option>
                    <option value="MY">Malaysia (MY)</option>
                    <option value="VN">Vietnam (VN)</option>
                    <option value="HK">Hong Kong (HK)</option>
                    <option value="KR">South Korea (KR)</option>
                  </select>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="label" for="start_date">Start date</label>
                  <input type="date" id="start_date" required class="input-field" />
                </div>
                <div>
                  <label class="label" for="end_date">End date</label>
                  <input type="date" id="end_date" required class="input-field" />
                </div>
              </div>
              <div>
                <label class="label" for="trip_purpose">Trip purpose</label>
                <select id="trip_purpose" class="input-field">
                  <option value="leisure">Leisure</option>
                  <option value="business">Business</option>
                  <option value="adventure">Adventure</option>
                  <option value="beach">Beach</option>
                  <option value="city_break">City Break</option>
                  <option value="winter_sports">Winter Sports</option>
                </select>
              </div>
              <button id="plan-trip-btn" type="submit" class="btn-primary w-full">Plan My Trip</button>
            </form>
          </div>

          <div id="travel-result" class="hidden"></div>
        </div>

        <div>
          <h2 class="mb-4 text-lg font-semibold text-ink-900">Past Trips</h2>
          <div id="past-plans-list" class="space-y-3"></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/public/assets/js/pages/travel-planner.js"></script>
</body>
</html>
