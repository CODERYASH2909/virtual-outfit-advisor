<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Virtual Outfit Advisor</title>
  <meta name="description" content="Reset your Virtual Outfit Advisor account password." />
  <link rel="stylesheet" href="/public/assets/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="flex min-h-screen items-center justify-center bg-auth-gradient px-4">
  <div class="w-full max-w-md animate-fade-in-up">
    <div class="mb-8 flex items-center justify-center gap-2.5">
      <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-voa-950 text-white font-display font-bold text-lg">V</div>
      <span class="font-display text-2xl text-ink-900">VOA</span>
    </div>

    <div class="rounded-2xl bg-white p-8 shadow-card border border-gray-100/80">
      <div id="request-section">
        <h1 class="mb-1 text-2xl font-bold text-ink-900">Forgot your password?</h1>
        <p class="mb-6 text-sm text-gray-500">Enter your email and we'll send you a reset link.</p>
        <form id="request-form" class="space-y-4">
          <div>
            <label class="label" for="email">Email address</label>
            <input type="email" id="email" required class="input-field" placeholder="you@example.com" />
          </div>
          <button type="submit" class="btn-primary w-full">Send Reset Link</button>
        </form>
      </div>

      <div id="reset-section" class="hidden">
        <h1 class="mb-1 text-2xl font-bold text-ink-900">Set a new password</h1>
        <p class="mb-6 text-sm text-gray-500">Choose a strong new password for your account.</p>
        <form id="reset-form" class="space-y-4">
          <div>
            <label class="label" for="new_password">New password</label>
            <input type="password" id="new_password" required class="input-field" placeholder="••••••••" />
          </div>
          <button type="submit" class="btn-primary w-full">Reset Password</button>
        </form>
      </div>

      <p class="mt-6 text-center text-sm text-gray-500">
        Remembered your password?
        <a href="/pages/login.html" class="font-medium text-voa-700 hover:text-voa-900 transition-colors">Back to log in</a>
      </p>
    </div>
  </div>

  <script type="module" src="/public/assets/js/pages/forgot-password.js"></script>
</body>
</html>
